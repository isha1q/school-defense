<!DOCTYPE html>
<html>
<body style="margin:0; overflow:hidden; background:black;">

<script type="module">
import * as THREE from "https://unpkg.com/three@0.160.0/build/three.module.js";
import { PointerLockControls } from "https://unpkg.com/three@0.160.0/examples/jsm/controls/PointerLockControls.js";

// ----------------------
// MOVEMENT STATE
// ----------------------
const move = { f: false, b: false, l: false, r: false };
const velocity = new THREE.Vector3();
const direction = new THREE.Vector3();

document.addEventListener("keydown", e => {
  if (e.code === "KeyW") move.f = true;
  if (e.code === "KeyS") move.b = true;
  if (e.code === "KeyA") move.l = true;
  if (e.code === "KeyD") move.r = true;
});

document.addEventListener("keyup", e => {
  if (e.code === "KeyW") move.f = false;
  if (e.code === "KeyS") move.b = false;
  if (e.code === "KeyA") move.l = false;
  if (e.code === "KeyD") move.r = false;
});

// ----------------------
// SCENE
// ----------------------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x202020);

// ----------------------
// CAMERA
// ----------------------
const camera = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
camera.position.set(0, 2, 5);

// ----------------------
// POINTER LOCK CONTROLS
// ----------------------
const controls = new PointerLockControls(camera, document.body);
document.body.addEventListener("click", () => controls.lock());

// ----------------------
// RENDERER
// ----------------------
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ----------------------
// OBJECTS
// ----------------------
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(1, 1, 1),
  new THREE.MeshStandardMaterial({ color: 0xff00ff })
);
scene.add(cube);

const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5, 5, 5);
scene.add(light);

// ----------------------
// ANIMATION LOOP
// ----------------------
function animate() {
  requestAnimationFrame(animate);

  const speed = 10;
  const friction = 8;
  const dt = 0.016;

  if (controls.isLocked) {
    velocity.x -= velocity.x * friction * dt;
    velocity.z -= velocity.z * friction * dt;

    direction.z = Number(move.f) - Number(move.b);
    direction.x = Number(move.r) - Number(move.l);
    direction.normalize();

    if (move.f || move.b) velocity.z -= direction.z * speed * dt;
    if (move.l || move.r) velocity.x -= direction.x * speed * dt;

    controls.moveRight(-velocity.x * dt);
    controls.moveForward(-velocity.z * dt);
  }

  cube.rotation.x += 0.01;
  cube.rotation.y += 0.01;

  renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
