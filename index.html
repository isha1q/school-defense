<!DOCTYPE html>
<html>
<head>
  <title>School Defense Test</title>
  <style>
    body {
      margin: 0;
      background: #222;
      color: #fff;
      font-family: sans-serif;
    }

    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      z-index: 2;
    }

    #shop {
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(0,0,0,0.7);
      padding: 10px;
      border-radius: 8px;
      z-index: 2;
    }

    canvas {
      width: 900px !important;
      height: 500px !important;
      background: #000 !important;
      border: 3px solid red !important;
      display: block;
      margin: 80px auto 0 auto;
    }
  </style>
</head>
<body>

  <div id="ui">
    <div>Credits: 0</div>
    <div>Gun: Pencil Shooter</div>
    <div>Damage: 1</div>
    <div>Fire Rate: 400 ms</div>
    <div>Health: 3</div>
  </div>

  <div id="shop">
    <strong>Shop</strong><br>
    Nerf Blaster ($150)<br>
    Rubber Band Launcher ($400)<br>
    Paper Airplane Cannon ($900)
  </div>

  <canvas id="game" width="900" height="500"></canvas>

  <script>
    const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const WIDTH = canvas.width;
const HEIGHT = canvas.height;

// UI elements
const uiCredits = document.querySelector("#ui div:nth-child(1)");
const uiGun = document.querySelector("#ui div:nth-child(2)");
const uiDamage = document.querySelector("#ui div:nth-child(3)");
const uiRate = document.querySelector("#ui div:nth-child(4)");
const uiHealth = document.querySelector("#ui div:nth-child(5)");

// Game state
let credits = 0;
let health = 3;

let bullets = [];
let enemies = [];

let lastShot = 0;
let lastSpawn = 0;

let gun = {
  name: "Pencil Shooter",
  damage: 1,
  rate: 400
};

// Update UI
function updateUI() {
  uiCredits.textContent = "Credits: " + credits;
  uiGun.textContent = "Gun: " + gun.name;
  uiDamage.textContent = "Damage: " + gun.damage;
  uiRate.textContent = "Fire Rate: " + gun.rate + " ms";
  uiHealth.textContent = "Health: " + health;
}

// Player
const player = {
  x: 80,
  y: HEIGHT - 140,
  w: 40,
  h: 80
};

// Shoot
canvas.addEventListener("mousedown", () => {
  const now = performance.now();
  if (now - lastShot < gun.rate) return;
  lastShot = now;

  bullets.push({
    x: player.x + player.w,
    y: player.y + player.h / 2,
    vx: 7,
    damage: gun.damage
  });
});

// Spawn enemies
function spawnEnemy() {
  const type = Math.random() < 0.6 ? "student" : "teacher";

  if (type === "student") {
    enemies.push({
      x: WIDTH + 40,
      y: HEIGHT - 130,
      w: 40,
      h: 70,
      hp: 3,
      speed: 1,
      reward: 10,
      color: "#7cf",
      label: "Sleepy Student"
    });
  } else {
    enemies.push({
      x: WIDTH + 40,
      y: HEIGHT - 130,
      w: 40,
      h: 70,
      hp: 6,
      speed: 1.4,
      reward: 20,
      color: "#fc7",
      label: "Coffee Teacher"
    });
  }
}

// Update game
function update(dt) {
  lastSpawn += dt;
  if (lastSpawn > 1200) {
    lastSpawn = 0;
    spawnEnemy();
  }

  bullets.forEach(b => {
    b.x += b.vx;
  });

  bullets = bullets.filter(b => b.x < WIDTH + 50);

  enemies.forEach(e => {
    e.x -= e.speed;
  });

  // Bullet collisions
  bullets.forEach(b => {
    enemies.forEach(e => {
      if (
        b.x > e.x &&
        b.x < e.x + e.w &&
        b.y > e.y &&
        b.y < e.y + e.h
      ) {
        e.hp -= b.damage;
        b.x = WIDTH + 200;
      }
    });
  });

  // Remove dead enemies
  enemies = enemies.filter(e => {
    if (e.hp <= 0) {
      credits += e.reward;
      updateUI();
      return false;
    }
    return true;
  });

  // Enemies reaching player
  enemies.forEach(e => {
    if (e.x < player.x + player.w - 10) {
      e.x = -9999;
      health -= 1;
      updateUI();
    }
  });

  enemies = enemies.filter(e => e.x > -100);
}

// Draw everything
function draw() {
  ctx.fillStyle = "#2b2b2b";
  ctx.fillRect(0, 0, WIDTH, HEIGHT);

  // Floor
  ctx.fillStyle = "#444";
  ctx.fillRect(0, HEIGHT - 60, WIDTH, 60);

  // Player
  ctx.fillStyle = "#4af";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  // Bullets
  ctx.fillStyle = "yellow";
  bullets.forEach(b => {
    ctx.fillRect(b.x, b.y, 8, 4);
  });

  // Enemies
  enemies.forEach(e => {
    ctx.fillStyle = e.color;
    ctx.fillRect(e.x, e.y, e.w, e.h);

    ctx.fillStyle = "#fff";
    ctx.font = "12px sans-serif";
    ctx.fillText(e.label, e.x - 10, e.y - 5);
  });
}

// Game loop
let lastTime = performance.now();
function loop(t) {
  const dt = t - lastTime;
  lastTime = t;

  update(dt);
  draw();

  requestAnimationFrame(loop);
}

updateUI();
requestAnimationFrame(loop);

  </script>

</body>
</html>
